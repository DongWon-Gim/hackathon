name: CI

on:
  push:
    branches:
      - develop
      - staging
  pull_request:
    branches:
      - develop
      - staging
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Nuxt application
        run: npm run build
        env:
          # Dummy values for build-time validation (not used at runtime)
          TURSO_DATABASE_URL: file:./ci.db
          TURSO_AUTH_TOKEN: ""
          JWT_SECRET: ci-build-secret
          ANTHROPIC_API_KEY: sk-dummy-build-key

      - name: Verify build output
        run: test -d .output && echo "Build output directory exists"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Use a separate SQLite file for CI test isolation
      TURSO_DATABASE_URL: file:./test.db
      TURSO_AUTH_TOKEN: ""
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-for-pr' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-dummy-test-key' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --force-reset

      - name: Run unit and integration tests with coverage
        run: npx vitest run --coverage
        # Coverage thresholds are enforced via vitest.config.ts:
        # lines: 50, functions: 50, branches: 50

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
