name: Production Health Monitor

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 실행
  workflow_dispatch:        # 수동 트리거 가능

jobs:
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    permissions:
      issues: write   # GitHub Issue 자동 생성 권한

    steps:
      - name: Check production API health
        id: check
        run: |
          PROD_URL="https://hackathon-rouge-tau.vercel.app"
          echo "Checking: $PROD_URL/api/auth/me"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$PROD_URL/api/auth/me" \
            --max-time 15 || echo "000")

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check status: $STATUS"

          # 401 = 서버 정상 (JWT 없으면 Unauthorized 반환)
          # 200 = 서버 정상 (인증된 경우)
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
            echo "✅ Production is healthy (HTTP $STATUS)"
          else
            echo "❌ Production health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Notify on health check failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // 같은 제목의 열린 이슈가 있으면 중복 생성 방지
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'production-incident',
              state: 'open',
            });

            if (issues.length > 0) {
              console.log('Open incident already exists — skipping duplicate issue creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monitor] Production health check failed — ${new Date().toISOString().slice(0,16)}`,
              body: [
                `## 프로덕션 헬스체크 실패`,
                ``,
                `- **감지 시각:** ${new Date().toISOString()}`,
                `- **대상 URL:** https://hackathon-rouge-tau.vercel.app`,
                `- **확인 엔드포인트:** \`GET /api/auth/me\``,
                ``,
                `### 대응 절차`,
                `1. Vercel 대시보드에서 배포 상태 확인`,
                `2. Turso DB 연결 상태 확인`,
                `3. 필요 시 이전 배포로 롤백: \`vercel rollback --yes\``,
                ``,
                `*이 이슈는 GitHub Actions 스케줄 모니터(\`monitor.yml\`)가 자동 생성했습니다.*`,
              ].join('\n'),
              labels: ['production-incident'],
            });
